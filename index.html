<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAKUN ENGINE | Sony Style Concept</title>
  <style>
    /* Sonyらしいミニマルで洗練されたスタイル */
    :root {
      --sony-black: #000000;
      --sony-gray: #1a1a1a;
      --sony-accent: #ffffff;
      --sony-text-dim: #999;
    }

    body {
      margin: 0;
      font-family: "SST", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--sony-black);
      color: var(--sony-accent);
      -webkit-font-smoothing: antialiased;
    }

    /* ヘッダー：極限までシンプルに */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      height: 60px;
      background: rgba(0, 0, 0, 0.95);
      position: fixed;
      top: 0; width: 100%;
      box-sizing: border-box;
      z-index: 1000;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.3em;
      margin: 0;
    }

    nav a {
      color: var(--sony-accent);
      margin-left: 30px;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
      transition: opacity 0.4s;
    }

    nav a:hover {
      opacity: 1;
    }

    /* ヒーロー：圧倒的な没入感 */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: black; /* ここに製品画像などを入れると完璧 */
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      z-index: 2;
      text-align: center;
    }

    .hero h2 {
      font-size: 60px;
      font-weight: 100;
      letter-spacing: 0.15em;
      margin: 0;
      animation: fadeUp 1.5s ease-out;
    }

    .hero p {
      font-size: 14px;
      letter-spacing: 0.4em;
      color: var(--sony-text-dim);
      margin-top: 20px;
      text-transform: uppercase;
    }

    /* セクション：余白を贅沢に使う */
    .section {
      padding: 120px 20px;
      max-width: 1400px;
      margin: 0 auto;
      text-align: center;
    }

    .section-label {
      font-size: 12px;
      color: var(--sony-text-dim);
      letter-spacing: 0.3em;
      margin-bottom: 40px;
      display: block;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 4px; /* Sony風のタイトな隙間 */
      background: #222; /* 境界線用 */
      padding: 4px;
    }

    .card {
      background: var(--sony-black);
      padding: 80px 40px;
      transition: background 0.6s;
      cursor: pointer;
    }

    .card:hover {
      background: var(--sony-gray);
    }

    .card h3 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 15px;
    }

    .card p {
      font-size: 13px;
      color: var(--sony-text-dim);
      line-height: 1.8;
    }

    /* ソニーらしいシャープなボタン */
    .btn-sony {
      margin-top: 60px;
      background: transparent;
      color: white;
      border: 1px solid #444;
      padding: 15px 60px;
      font-size: 12px;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.4s;
    }

    .btn-sony:hover {
      border-color: white;
      background: white;
      color: black;
    }

    footer {
      padding: 60px 40px;
      background: #111;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #666;
      text-align: left;
    }

    /* アニメーション */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<header>
  <h1>HAKUN ENGINE</h1>
  <nav>
    <a href="#">Products</a>
    <a href="#">Technology</a>
    <a href="#">Support</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-content">
    <p>New Evolution</p>
    <h2>木村のテストページ</h2>
    <button class="btn-sony" onclick="location.href='#projects'">VIEW DETAILS</button>
  </div>
</div>

<div id="projects" class="section">
  <span class="section-label">PROJECTS</span>
  <div class="cards">
    <div class="card">
      <h3>Python Application</h3>
      <p>緻密なアルゴリズムが、<br>日常を劇的に進化させる。</p>
    </div>
    <div class="card">
      <h3>Game Development</h3>
      <p>PlayStationを彷彿とさせる、<br>圧倒的な没入体験。</p>
    </div>
    <div class="card">
      <h3>Web Infrastructure</h3>
      <p>美しさと機能美の融合。<br>次世代のスタンダードを構築する。</p>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 HAKUN ENGINE. ALL RIGHTS RESERVED.</p>
  <p style="margin-top:10px;">このページはデザインコンセプトとして作成されています。</p>
</footer>

</body>
</html>
